<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>🐢 小乌龟遥控器</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a2e;
      color: #eee;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    h1 { font-size: 1.5em; margin-bottom: 6px; color: #00d4aa; }
    #status {
      background: #16213e;
      border: 1px solid #00d4aa;
      border-radius: 8px;
      padding: 8px 20px;
      margin-bottom: 20px;
      font-size: 0.9em;
      color: #aaa;
    }
    #status span { color: #00d4aa; font-weight: bold; }
    .d-pad {
      display: grid;
      grid-template-columns: repeat(3, 90px);
      grid-template-rows: repeat(3, 90px);
      gap: 10px;
      margin-bottom: 30px;
    }
    .btn {
      background: #16213e;
      border: 2px solid #00d4aa;
      border-radius: 12px;
      color: #00d4aa;
      font-size: 2em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s, transform 0.1s;
    }
    .btn:active, .btn.active {
      background: #00d4aa;
      color: #1a1a2e;
      transform: scale(0.95);
    }
    .btn.stop {
      grid-column: 2;
      grid-row: 2;
      background: #2d1515;
      border-color: #ff4757;
      color: #ff4757;
      font-size: 1em;
      font-weight: bold;
    }
    .btn.stop:active, .btn.stop.active {
      background: #ff4757;
      color: #fff;
    }
    .empty { background: transparent; border: none; cursor: default; }
    #log {
      width: 100%;
      max-width: 340px;
      background: #16213e;
      border-radius: 8px;
      padding: 10px;
      font-size: 0.75em;
      color: #888;
      height: 100px;
      overflow-y: auto;
    }
    #log p { margin-bottom: 2px; }
    #log p.ok { color: #00d4aa; }
    #log p.err { color: #ff4757; }
    #speed-row {
      display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
      font-size: 0.85em;
    }
    input[type=range] { width: 140px; accent-color: #00d4aa; }
    #server-row {
      display: flex; align-items: center; gap: 6px; margin-bottom: 16px;
      font-size: 0.85em; flex-wrap: wrap; justify-content: center;
    }
    #server-row input {
      background: #16213e; border: 1px solid #00d4aa; border-radius: 6px;
      color: #eee; padding: 4px 8px; width: 180px;
    }
    #server-row button {
      background: #00d4aa; color: #1a1a2e; border: none;
      border-radius: 6px; padding: 5px 12px; cursor: pointer; font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>🐢 小乌龟遥控器</h1>
  <div id="status">服务器：<span id="srv-label">未连接</span></div>

  <div id="server-row">
    <input id="srv-input" type="text" placeholder="192.168.x.x:8888" value="localhost:8888" />
    <button onclick="setServer()">连接</button>
  </div>

  <div id="speed-row">
    速度：<input type="range" id="speed" min="0.5" max="3" step="0.5" value="1.5" />
    <span id="speed-val">1.5</span>
  </div>

  <div class="d-pad">
    <div class="empty"></div>
    <div class="btn" id="btn-forward"  ontouchstart="send('forward')" ontouchend="send('stop')">▲</div>
    <div class="empty"></div>

    <div class="btn" id="btn-left"    ontouchstart="send('left')"    ontouchend="send('stop')">◀</div>
    <div class="btn stop" id="btn-stop" ontouchstart="send('stop')">STOP</div>
    <div class="btn" id="btn-right"   ontouchstart="send('right')"   ontouchend="send('stop')">▶</div>

    <div class="empty"></div>
    <div class="btn" id="btn-back"    ontouchstart="send('back')"    ontouchend="send('stop')">▼</div>
    <div class="empty"></div>
  </div>

  <div id="log"><p>等待操作…</p></div>

  <script>
    let SERVER = 'http://localhost:8888';

    document.getElementById('speed').addEventListener('input', function() {
      document.getElementById('speed-val').innerText = this.value;
    });

    function setServer() {
      const v = document.getElementById('srv-input').value.trim();
      SERVER = v.startsWith('http') ? v : 'http://' + v;
      document.getElementById('srv-label').innerText = v;
      addLog('已设置服务器：' + SERVER, 'ok');
    }

    function addLog(msg, cls='') {
      const log = document.getElementById('log');
      const p = document.createElement('p');
      if (cls) p.className = cls;
      p.innerText = new Date().toLocaleTimeString() + ' ' + msg;
      log.appendChild(p);
      log.scrollTop = log.scrollHeight;
    }

    // 键盘支持（桌面调试用）
    const keyMap = { ArrowUp:'forward', ArrowDown:'back', ArrowLeft:'left', ArrowRight:'right', ' ':'stop' };
    document.addEventListener('keydown', e => { if (keyMap[e.key]) { e.preventDefault(); send(keyMap[e.key]); } });
    document.addEventListener('keyup',  e => { if (keyMap[e.key] && keyMap[e.key] !== 'stop') send('stop'); });

    async function send(cmd) {
      const speed = document.getElementById('speed').value;
      try {
        const res = await fetch(`${SERVER}/cmd?action=${cmd}&speed=${speed}`, { method: 'GET' });
        const txt = await res.text();
        addLog(`→ ${cmd}  ${txt}`, 'ok');
      } catch(e) {
        addLog(`✗ ${cmd} 失败：${e.message}`, 'err');
      }
    }
  </script>
</body>
</html>
